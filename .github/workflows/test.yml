name: test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  glasslock:
    name: glasslock (Gleam ${{ matrix.gleam }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glasslock
    strategy:
      fail-fast: false
      matrix:
        otp: ["27", "28"]
        gleam: ["1.14.0", "1.15.4"]
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          gleam-version: ${{ matrix.gleam }}
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam test
      - run: gleam format --check src test

  glasskey:
    name: glasskey (Gleam ${{ matrix.gleam }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glasskey
    strategy:
      fail-fast: false
      matrix:
        gleam: ["1.15.4"]
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: ${{ matrix.gleam }}
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam test
      - run: gleam format --check src test

  example-backend:
    name: example/backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example/backend
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.4"
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam build
      - run: gleam format --check src

  example-frontend:
    name: example/frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: example/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.4"
          rebar3-version: "3"
      - run: gleam deps download
      - run: gleam build
      - run: gleam format --check src
